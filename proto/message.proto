syntax = "proto3";
// Dart package name
package pb;
// Go package name
option go_package = "flap/pb";
import "core.proto";

// Request
message Request {
  int64 port = 5;
  oneof requests {
    Init init = 1;
    Cancel cancel = 4;
    RpcRequest rpc_request = 10;
  }
}

// Response
message Response {
  oneof responses {
    Error error = 1;
    Done done = 6;
    Push push = 7;
    Request request = 8;
    RpcResponse rpc_response = 10;
  }
}

// ConnectRequest
message RpcRequest {
  string path = 1;
  bytes payload = 2;
}

// ConnectResponse
message RpcResponse { bytes payload = 1; }

// Push carries any Push-prefixed message as a type-tagged payload,
// analogous to RpcRequest/RpcResponse. Use the generated NewPushXxx
// helpers on the Go side and PushHandler on the Dart side.
message Push {
  string type = 1;
  bytes payload = 2;
}
