syntax = "proto3";
// Dart package name
package pb;
// Go package name
option go_package = "flap/pb";
import "core.proto";
import "push.proto";

// TODO: import your proto
import "nostr.proto";

// Request
message Request {
  int64 port = 5;
  oneof requests {
    Init init = 1;
    Cancel cancel = 4;
    RpcRequest rpc_request = 10;
  }
}

// Response
message Response {
  oneof responses {
    Error error = 1;
    Done done = 6;
    Push push = 7;
    Request request = 8;
    RpcResponse rpc_response = 10;
  }
}

// ConnectRequest
message RpcRequest {
  string path = 1;
  bytes payload = 2;
}

// ConnectResponse
message RpcResponse { bytes payload = 1; }

// Push
message Push {
  oneof type {
    Error error = 1;
    // TODO: ad your pushes here
    Note note = 2 [deprecated = true];
    PushNip05 nip05 = 3;
  }
}
