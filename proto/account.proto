syntax = "proto3";
// Dart package name
package pb;
// Go package name
option go_package = "flap/pb";

enum AccountType {
  BROWSER_EXTENSION = 0;
  BUNKER = 1;
  NSEC = 2;
}

message Account {
  AccountType type = 1;
  string public_key = 2;
  string private_key = 3;
  string session_key = 4;
}

message Accounts { repeated Account accounts = 1; }
