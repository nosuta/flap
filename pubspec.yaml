name: flap
description: "flap"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0
workspace:
  - packages/native_internal
  - packages/web_internal

dependencies:
  web_internal:
    path: packages/web_internal
  native_internal:
    path: packages/native_internal

  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  cupertino_icons: ^1.0.9
  web: ^1.1.1
  # google_fonts: ^6.2.1
  hexpattern: ^13.1.0
  super_sliver_list: ^0.4.1
  protobuf: ^6.0.0
  logging: ^1.3.0
  cached_network_image: ^3.4.1
  fixnum: ^1.1.1
  timeago: ^3.7.1
  skeletonizer: ^2.1.3
  flutter_animate: ^4.5.2
  ffi: ^2.2.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1

flutter:
  fonts:
    - family: NotoSansJP
      fonts:
        - asset: fonts/NotoSansJP-Regular.ttf
        - asset: fonts/NotoSansJP-Bold.ttf
          weight: 700
    - family: NotoColorEmoji
      fonts:
        - asset: fonts/NotoColorEmoji-Regular.ttf
  assets:
    - path: packages/web_internal/worker.wasm
      platforms: [web]

  uses-material-design: true
